name: 🌟 Feature Request
description: Suggest an idea to improve the project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## 🌟 Feature Request

        Please suggest a new idea or enhancement to improve the project.

  - type: textarea
    id: feature_description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see.
      placeholder: I’d like to be able to export data as JSON...
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Currently, users cannot back up their data easily...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe how you envision this feature working.
      placeholder: Add a "Download JSON" button in the report view...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions you've considered.
      placeholder: I also considered using a CSV export but it's less structured...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or mockups about the feature request.
    validations:
      required: false
